name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: team_eyX81hAN1YDIzAamV6sDqB2v
  VERCEL_PROJECT_ID: prj_LFPPUILSV8Iidd100J9EBcHThy7k

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel production env
        run: npx vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build Nitro Vercel output
        run: npm run build

      - name: Deploy prebuilt output
        run: npx vercel deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

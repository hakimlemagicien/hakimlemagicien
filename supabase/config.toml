[auth]
site_url = "https://hakimlemagicien.com"
additional_redirect_urls = [
  "https://hakimlemagicien.com/**",
  "http://localhost:5173/**",
  "http://localhost:5176/**",
  "http://localhost:5177/**",
  "http://127.0.0.1:5173/**",
]

[auth.email]
enable_signup = true
# OTP: 8 digits on production auth; expires in 10 minutes (matches email copy)
otp_length = 8
otp_expiry = 600

[auth.email.template.magic_link]
subject = "تحقق من بريدك الإلكتروني"
content_path = "./supabase/email-templates/magic-link.html"

[auth.email.template.invite]
subject = "دعوة من Hakim Coaching — أكمل إنشاء حسابك"
content_path = "./supabase/email-templates/invite-user.html"

[functions.admin-accept-payment]
verify_jwt = true

[functions.admin-resend-access]
verify_jwt = true

[functions.notify-receipt-upload]
verify_jwt = false
